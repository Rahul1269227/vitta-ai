services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-txn_user}
      POSTGRES_USER: ${POSTGRES_USER:-txn_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-txn_password}
    ports:
      - "${HOST_POSTGRES_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-txn_user} -d ${POSTGRES_DB:-txn_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    profiles: ["app"]
    build: .
    ports:
      - "${HOST_API_PORT:-18000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${POSTGRES_URL:-postgresql+psycopg://txn_user:txn_password@postgres:5432/txn_user}
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn sentinelfi.main:app --host 0.0.0.0 --port 8000

volumes:
  pgdata:
